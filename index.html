<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gemini AI Chatbot</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 600px; margin: 20px auto; padding: 20px; }
        #chat-window { height: 300px; border: 1px solid #ccc; overflow-y: scroll; padding: 10px; margin-bottom: 10px; background: #f9f9f9; }
        .user-msg { color: blue; text-align: right; margin: 5px 0; }
        .ai-msg { color: green; text-align: left; margin: 5px 0; }
        #input-container { display: flex; }
        #user-input { flex-grow: 1; padding: 10px; }
        button { padding: 10px; }
    </style>
</head>
<body>

    <h2>Gemini AI Chatbot</h2>
    <div id="chat-window"></div>
    
    <div id="input-container">
        <input type="text" id="user-input" placeholder="พิมพ์ข้อความที่นี่...">
        <button onclick="sendMessage()">ส่ง</button>
    </div>

    <script>
        async function sendMessage() {
            const inputField = document.getElementById('user-input');
            const chatWindow = document.getElementById('chat-window');
            const message = inputField.value.trim();
            
            if (!message) return;

            // แสดงข้อความของผู้ใช้บนหน้าจอ
            chatWindow.innerHTML += `<div class="user-msg"><b>คุณ:</b> ${message}</div>`;
            inputField.value = '';
            chatWindow.scrollTop = chatWindow.scrollHeight;

            try {
                // ส่งข้อความไปที่ Backend Serverless Function ของ Vercel
                const response = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: message })
                });
                
                const data = await response.json();
                
                // แสดงข้อความตอบกลับจาก AI
                chatWindow.innerHTML += `<div class="ai-msg"><b>AI:</b> ${data.reply}</div>`;
            } catch (error) {
                chatWindow.innerHTML += `<div class="ai-msg" style="color:red;"><b>ระบบ:</b> เกิดข้อผิดพลาดในการเชื่อมต่อ</div>`;
            }
            
            chatWindow.scrollTop = chatWindow.scrollHeight;
        }
    </script>
</body>
</html>
